# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger: none
schedules:
- cron: "15 4 * * *"
  displayName: Weekly Monday & Wednesday build
  branches:
    include:
    - develop

pool:
  vmImage: 'windows-latest'

variables:
- group: sonar
- name: 'solution'
  value: '**/*.sln'
- name: 'buildPlatform'
  value: 'Any CPU'
- name: 'buildConfiguration'
  value: 'Release'


steps:
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      # SCRIPT PARA USAR LAST TAG GIT como buildnumber
      # este script actualiza la variable de azure repos buildnumber por lo tanto solo es util
      # para lanzarlo desde los pipes de azure devops
      # se tiene que crear la invocacion al script y seleccionar el script 
      IFS="-"
      version=$(git log -n1000 --pretty='format:%d' | sed 's/, /\n/g' | grep 'tag:' | sed -E 's/^[ \t\(]*tag: //g' | sed -E 's/\)[ \t]*$//g' | grep -i '^[0-9\.]\+\(-KO\|-RT\|-RST\)\( \)*$' | head -n 1)
      set $version
      newbuildnumber=$1
      echo $newbuildnumber
      echo "##vso[build.updatebuildnumber]$newbuildnumber"
  displayName: 'Bash Script'
- task: NuGetToolInstaller@1
  displayName: 'Install NuGet >=6.3.0-0'
  inputs:
    versionSpec: '>=6.3.0-0'
    checkLatest: true

- task: ArtifactoryNuGet@2
  inputs:
    command: 'restore'
    artifactoryService: 'ARTIFACTORY - BESTINVER-bes_GestorAltas'
    targetResolveRepo: 'bestinver-nuget'
    solutionPath: '**/*.sln'
    noNuGetCache: true
    nugetProtocolVersion: 'v3'
