- task: UseDotNet@2
  displayName: 'Install .NET Core 6 SDK'
  inputs:
    version: 6.x
    performMultiLevelLookup: true

- task: YarnInstaller@3
  inputs:
    versionSpec: '1.x'

- task: CmdLine@2
  inputs:
    script: 'npm install -g node@10.19.0'

- task: Yarn@3
  displayName: 'Yarn install Public'
  inputs:
